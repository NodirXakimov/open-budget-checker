<!DOCTYPE html>
<html lang="uz">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telefon Raqam Tekshirish</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>

    <div class="app">

      <header>
        <h1>📞 Телефон рақамлар</h1>
        <h2>(Гулистон МФЙ)</h2>

        <div class="stats">
          <span id="totalCount"></span>
          <span id="resultCount"></span>
        </div>

      </header>

      <div class="searchBox">
        <input id="searchInput" placeholder="Телефон рақам бўйича қидириш..." />
      </div>

      <div class="tableWrapper">

        <table>

          <thead>
            <tr>
              <th>T/R</th>
              <th>Телефон рақам</th>
              <th>Сана</th>
            </tr>
          </thead>

          <tbody id="tableBody"></tbody>

        </table>

      </div>

    </div>

    <script src="app.js?v=10.0"></script>

  </body>

</html>
